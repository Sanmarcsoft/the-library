    # --- Sanmarcsoft: the-library repo ---
    - name: prime-agent-improvement-tracker
      description: Subagent prompt for analyzing library item usage and generating improvement reports
      source: https://github.com/Sanmarcsoft/the-library/blob/main/skills/prime-agent/improvement-tracker-prompt.md
      local: /config/.claude/skills/library/skills/prime-agent/improvement-tracker-prompt.md
      requires: [skill:prime-agent]
      trusted: true
