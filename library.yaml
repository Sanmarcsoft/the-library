    # --- Sanmarcsoft: local agents (source = GitHub, local = filesystem) ---
    - name: devops-workflow-enforcer
      description: Central DevOps gatekeeper enforcing TDD, GitHub issue tracking, project board compliance, feature branch workflow, and deployment gates across all Sanmarcsoft projects — blocks direct commits to main/testing, requires issues with acceptance criteria, enforces dev/testing/production pipeline
      source: https://github.com/Sanmarcsoft/the-library/blob/main/agents/devops-workflow-enforcer.md
      local: /config/.claude/agents/devops-workflow-enforcer.md
      trusted: true
      tags: [devops, github, issues, feature-branch, tdd, project-board, gatekeeper, pr, deployment, testing, ci-cd, production, branching]

    - name: scrum-master
      description: Agile Scrum Master for GitHub project management — scaffolds milestones, creates issues with acceptance criteria, manages labels, generates gh CLI scripts for sprint planning and project board automation
      source: https://github.com/Sanmarcsoft/the-library/blob/main/agents/scrum-master-agent.md
      local: /config/.claude/agents/scrum-master-agent.md
      trusted: true
      tags: [scrum, agile, sprint, milestone, issues, labels, project-board, planning, github]

    - name: github-project-manager
