version: "1"

default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: bowser
      description: Headless browser automation using Playwright CLI
      source: https://github.com/disler/pi-vs-claude-code/blob/main/.pi/skills/bowser.md
      tags: [browser, playwright, automation, scraping, headless]

    - name: prime-agent
      description: Intelligent library routing that detects when catalog skills, agents, or prompts would help the current task, auto-installs with confidence tiers, and tracks improvement opportunities
      source: https://github.com/smsmatt/the-library/blob/main/skills/prime-agent/SKILL.md
      tags: [routing, discovery, library, meta, automation, intent-matching]

    - name: ruff
      description: Guide for using ruff, the extremely fast Python linter and formatter
      source: https://github.com/disler/idd-library-engineering/blob/main/.claude/skills/ruff/SKILL.md
      tags: [python, linter, formatter, ruff, code-quality]

    - name: ty
      description: Guide for using ty, the extremely fast Python type checker and language server
      source: https://github.com/disler/idd-library-engineering/blob/main/.claude/skills/ty/SKILL.md
      tags: [python, type-checker, ty, types, language-server]

    - name: frontend-design
      description: Impeccable design vocabulary — comprehensive frontend design skill with typography, color theory, spatial design, motion, interaction patterns, responsive design, and UX writing references. Anti-AI-slop patterns that avoid generic aesthetics.
      source: /config/workspace/projects/impeccable/.claude/skills/frontend-design/SKILL.md
      tags: [design, frontend, css, ui, ux, typography, color, layout, responsive, animation, accessibility, tailwind, html, components, web]

    - name: design-audit
      description: Impeccable design audit — comprehensive quality scan covering accessibility, performance, theming, responsive behavior, and visual hierarchy with severity ratings
      source: /config/workspace/projects/impeccable/.claude/skills/audit/SKILL.md
      tags: [design, audit, accessibility, a11y, performance, quality, review, wcag]

    - name: design-critique
      description: Impeccable design critique — UX design review examining hierarchy, clarity, emotional resonance, and user experience quality
      source: /config/workspace/projects/impeccable/.claude/skills/critique/SKILL.md
      tags: [design, critique, ux, review, feedback, hierarchy, clarity]

    - name: design-polish
      description: Impeccable design polish — meticulous final pass for alignment, spacing, consistency, and pixel-perfect refinement
      source: /config/workspace/projects/impeccable/.claude/skills/polish/SKILL.md
      tags: [design, polish, alignment, spacing, consistency, refinement, pixel-perfect]

    - name: design-animate
      description: Impeccable motion design — add purposeful animation with proper easing curves, staggering, reduced motion support, and performance-safe transitions
      source: /config/workspace/projects/impeccable/.claude/skills/animate/SKILL.md
      tags: [design, animation, motion, transitions, easing, css-animation, performance]

    - name: design-colorize
      description: Impeccable color system — introduce strategic color using OKLCH color spaces, tinted neutrals, accessible contrast ratios, and intentional palette design
      source: /config/workspace/projects/impeccable/.claude/skills/colorize/SKILL.md
      tags: [design, color, palette, oklch, contrast, accessibility, theming, dark-mode]

    - name: design-harden
      description: Impeccable hardening — add error handling, i18n support, edge case protection, and resilience to frontend components
      source: /config/workspace/projects/impeccable/.claude/skills/harden/SKILL.md
      tags: [design, hardening, error-handling, i18n, edge-cases, resilience, forms]

    - name: design-optimize
      description: Impeccable optimization — frontend performance improvements for loading, rendering, bundle size, and Core Web Vitals
      source: /config/workspace/projects/impeccable/.claude/skills/optimize/SKILL.md
      tags: [design, performance, optimization, web-vitals, loading, bundle-size, lighthouse]

    - name: design-extract
      description: Impeccable component extraction — pull UI patterns into reusable, well-documented components with proper interfaces
      source: /config/workspace/projects/impeccable/.claude/skills/extract/SKILL.md
      tags: [design, components, extraction, reusable, refactoring, abstraction]

    - name: design-adapt
      description: Impeccable responsive adaptation — adapt designs for different devices using mobile-first, container queries, and fluid design patterns
      source: /config/workspace/projects/impeccable/.claude/skills/adapt/SKILL.md
      tags: [design, responsive, mobile, tablet, desktop, container-queries, fluid, breakpoints]

    - name: mcp2cli-first
      description: Enforces mcp2cli with --toon as the primary MCP access method for 96-99% token savings — applies to all MCP server interactions including Wolfram, Moneypenny, and external APIs
      source: https://github.com/smsmatt/the-library/blob/main/skills/mcp2cli-first/SKILL.md
      tags: [mcp, mcp2cli, token-efficiency, wolfram, moneypenny, api, optimization]

    - name: wolfram
      description: Use Wolfram Alpha and Wolfram Language for mathematics, computation, data analysis, plotting, unit conversions, scientific calculations, statistics, financial modeling, and real-time data lookups via MCP tools
      source: https://github.com/smsmatt/the-library/blob/main/skills/wolfram/SKILL.md
      tags: [math, computation, wolfram, statistics, plotting, science, calculation, conversion, finance, data-analysis, algebra, calculus]

    - name: design-mathematics
      description: Classical design proportions (golden ratio, rule of thirds, Pythagorean paths, Modulor, fractal self-similarity, color wheel geometry, musical typographic scales) and information design formulas (recency decay, importance scoring, volume normalization, Shannon entropy, Fitts's Law) for mathematically grounded UI work and verification
      source: https://github.com/smsmatt/the-library/blob/main/skills/design-mathematics/SKILL.md
      tags: [design, mathematics, golden-ratio, rule-of-thirds, typography, proportions, fibonacci, modulor, fractal, color-wheel, information-design, entropy, fitts-law, grid, spacing, dashboard]

    - name: proofshot
      description: Visual verification of UI work — records browser sessions with video proof, screenshots, error capture, visual regression diffing, and PR proof posting via the ProofShot CLI. Use after building or modifying any UI component, page, or visual feature. Integrates with the frontend-design skill suite.
      source: /config/workspace/projects/proofshot/skills/claude/SKILL.md
      tags: [visual-verification, ui-testing, screenshots, video-proof, browser, proofshot, visual-regression, diff, pr-proof, frontend, design-verification]

    - name: proofshot-issue-resolution
      description: Document GitHub issue resolution with visual before/after evidence — captures the broken state, deploys the fix, captures the fixed state, and posts structured proof as a GitHub issue comment before closing. Extends the base proofshot skill for issue-driven workflows.
      source: https://github.com/Sanmarcsoft/the-library/blob/main/skills/proofshot-issue-resolution/SKILL.md
      requires: [skill:proofshot]
      tags: [proofshot, github-issues, visual-evidence, before-after, bug-fix, issue-resolution, screenshots, gh-cli, verification, closing-issues]

    - name: agent-governance
      description: Meta-governance framework for multi-agent operations — sub-agent spawn rules, MCP access tiers, mandatory workflows (TDD, GitHub issues, security), RCA process, ChromaDB knowledge persistence
      source: /config/.claude/skills/library/skills/agent-governance/SKILL.md
      tags: [governance, meta-agent, sub-agent, spawn, mcp, tdd, github, security, rca, chromadb, knowledge, sessions]

    - name: uv
      description: Guide for using uv, the Python package and project manager
      source: https://github.com/disler/idd-library-engineering/blob/main/.claude/skills/uv/SKILL.md
      tags: [python, package-manager, uv, virtualenv, pip-replacement]

  agents:
    - name: bowser
      description: Headless browser automation agent using Playwright CLI for browsing, UI testing, and scraping
      source: https://github.com/disler/pi-vs-claude-code/blob/main/.pi/agents/bowser.md
      requires: [skill:bowser]
      tags: [browser, playwright, automation, scraping, testing]

    - name: builder
      description: Implementation and code generation
      source: https://github.com/disler/pi-vs-claude-code/blob/main/.pi/agents/builder.md
      tags: [implementation, code-generation, building, scaffold]

    - name: documenter
      description: Documentation and README generation
      source: https://github.com/disler/pi-vs-claude-code/blob/main/.pi/agents/documenter.md
      tags: [documentation, readme, docs, writing]

    - name: plan-reviewer
      description: Plan critic - reviews, challenges, and validates implementation plans
      source: https://github.com/disler/pi-vs-claude-code/blob/main/.pi/agents/plan-reviewer.md
      tags: [planning, review, validation, architecture]

    - name: planner
      description: Architecture and implementation planning
      source: https://github.com/disler/pi-vs-claude-code/blob/main/.pi/agents/planner.md
      tags: [planning, architecture, design, implementation]

    - name: red-team
      description: Security and adversarial testing
      source: https://github.com/disler/pi-vs-claude-code/blob/main/.pi/agents/red-team.md
      tags: [security, adversarial, testing, pentest, red-team]

    - name: reviewer
      description: Code review and quality checks
      source: https://github.com/disler/pi-vs-claude-code/blob/main/.pi/agents/reviewer.md
      tags: [code-review, quality, review, best-practices]

    - name: scout
      description: Fast recon and codebase exploration
      source: https://github.com/disler/pi-vs-claude-code/blob/main/.pi/agents/scout.md
      tags: [exploration, recon, codebase, search, discovery]

    - name: uv-agent
      description: Python environment and toolchain agent using the Astral stack (uv, ruff, ty)
      source: https://github.com/disler/idd-library-engineering/blob/main/.claude/agents/uv-agent.md
      requires: [skill:uv, skill:ruff, skill:ty]
      tags: [python, uv, ruff, ty, toolchain, environment]

    - name: devops-workflow-enforcer
      description: Central DevOps gatekeeper enforcing TDD, GitHub issue tracking, project board compliance, feature branch workflow, and deployment gates across all Sanmarcsoft projects — blocks direct commits to main/testing, requires issues with acceptance criteria, enforces dev/testing/production pipeline
      source: /config/.claude/agents/devops-workflow-enforcer.md
      tags: [devops, github, issues, feature-branch, tdd, project-board, gatekeeper, pr, deployment, testing, ci-cd, production, branching]

    - name: scrum-master
      description: Agile Scrum Master for GitHub project management — scaffolds milestones, creates issues with acceptance criteria, manages labels, generates gh CLI scripts for sprint planning and project board automation
      source: /config/.claude/agents/scrum-master-agent.md
      tags: [scrum, agile, sprint, milestone, issues, labels, project-board, planning, github]

    - name: github-project-manager
      description: Manages GitHub project board column movements and status synchronization — moves issues between Backlog, Ready, In Progress, In Review, and Done columns via GraphQL
      source: /config/.claude/agents/github-project-manager.md
      tags: [github, project-board, kanban, status, issues, automation, columns]

  prompts:
    - name: plan-w-team
      description: Creates a concise engineering implementation plan based on user requirements and saves it to specs directory
      source: https://github.com/disler/idd-library-engineering/blob/main/.claude/commands/plan_w_team.md
      tags: [planning, implementation, team, requirements, specs]

    - name: prime-agent-improvement-tracker
      description: Subagent prompt for analyzing library item usage and generating improvement reports
      source: https://github.com/smsmatt/the-library/blob/main/skills/prime-agent/improvement-tracker-prompt.md
      requires: [skill:prime-agent]
      tags: [meta, improvement, tracking, library, prime-agent]

    - name: prime-agent-library-improver
      description: Subagent prompt for generating and applying patches to library items from improvement reports
      source: https://github.com/smsmatt/the-library/blob/main/skills/prime-agent/library-improver-prompt.md
      requires: [skill:prime-agent, prompt:prime-agent-improvement-tracker]
      tags: [meta, improvement, patching, library, prime-agent]
